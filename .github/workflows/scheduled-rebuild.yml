name: Scheduled rebuild

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  trigger-vercel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          response=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel responded with HTTP $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Deploy hook returned non-2xx status"
            exit 1
          fi
